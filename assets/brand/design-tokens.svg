  <rect x="420" y="238" width="90" height="26" rx="4" fill="#FEF3C7"/>
  <text x="465" y="255" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#92400E" text-anchor="middle">В работе</text>


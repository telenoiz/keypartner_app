  <text x="200" y="192" font-family="Inter, Arial, sans-serif" font-size="10" fill="#4B5563">#DBEAFE</text>

  <!-- Success -->
  <rect x="280" y="100" width="64" height="64" rx="8" fill="#16A34A"/>
  <text x="280" y="178" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#111827">Success</text>
  <text x="280" y="192" font-family="Inter, Arial, sans-serif" font-size="10" fill="#4B5563">#16A34A</text>


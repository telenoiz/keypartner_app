  <text x="40" y="390" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#4B5563" letter-spacing="1">ТИПОГРАФИКА — INTER</text>

  <!-- Display 30px/700 -->
  <text x="40" y="430" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Display — 30px / 700</text>

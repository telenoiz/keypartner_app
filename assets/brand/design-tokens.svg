  <!-- H2 24px/600 -->
  <text x="40" y="464" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#111827">H2 — 24px / 600</text>
  <text x="700" y="464" font-family="Inter, Arial, sans-serif" font-size="10" fill="#4B5563" text-anchor="end">--text-h2</text>

  <!-- H3 20px/600 -->
  <text x="40" y="494" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#111827">H3 — 20px / 600</text>
  <text x="700" y="494" font-family="Inter, Arial, sans-serif" font-size="10" fill="#4B5563" text-anchor="end">--text-h3</text>

  <!-- H4 16px/600 -->
  <text x="40" y="520" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">H4 — 16px / 600</text>
  <text x="700" y="520" font-family="Inter, Arial, sans-serif" font-size="10" fill="#4B5563" text-anchor="end">--text-h4</text>

  <!-- Body 14px/400 -->
  <text x="40" y="544" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#111827">Body — 14px / 400 — основной текст интерфейса</text>
  <text x="700" y="544" font-family="Inter, Arial, sans-serif" font-size="10" fill="#4B5563" text-anchor="end">--text-body</text>

  <!-- Small 12px/400 -->
  <text x="40" y="565" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#4B5563">Small — 12px / 400 — подписи, мета-информация</text>

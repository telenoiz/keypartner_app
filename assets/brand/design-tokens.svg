<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" role="img" aria-label="Design tokens: цветовая палитра и типографика keypartner_app">
  <title>Design Tokens — keypartner_app</title>
  <rect width="800" height="620" fill="#FFFFFF"/>

  <!-- Заголовок -->
  <text x="40" y="44" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Design Tokens — keypartner_app</text>
  <line x1="40" y1="56" x2="760" y2="56" stroke="#D1D5DB" stroke-width="1"/>

  <!-- РАЗДЕЛ: Цветовая палитра -->
  <text x="40" y="88" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#4B5563" letter-spacing="1">ЦВЕТОВАЯ ПАЛИТРА</text>

  <!-- Primary -->
  <rect x="40" y="100" width="64" height="64" rx="8" fill="#2563EB"/>
  <text x="40" y="178" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#111827">Primary</text>
  <text x="40" y="192" font-family="Inter, Arial, sans-serif" font-size="10" fill="#4B5563">#2563EB</text>

  <!-- Primary Dark -->
  <rect x="120" y="100" width="64" height="64" rx="8" fill="#1D4ED8"/>
  <text x="120" y="178" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#111827">Primary Dark</text>
  <text x="120" y="192" font-family="Inter, Arial, sans-serif" font-size="10" fill="#4B5563">#1D4ED8</text>

  <!-- Primary Light -->
  <rect x="200" y="100" width="64" height="64" rx="8" fill="#DBEAFE" stroke="#D1D5DB" stroke-width="1"/>

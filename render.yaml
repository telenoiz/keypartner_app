services:
  - type: web
    name: keypartner-app
    env: python
    region: frankfurt
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn keypartner.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_ENGINE
        value: "django.db.backends.postgresql"
      - key: DB_NAME
        fromDatabase:
          name: keypartner-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: keypartner-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: keypartner-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: keypartner-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: keypartner-db
          property: port
      - key: SECRET_KEY
        generateValue: true
      - key: SITE_AUTHOR
        value: "Люлюкин Игорь Владимирович"

databases:
  - name: keypartner-db
    databaseName: keypartner_db
    user: keypartner
    plan: free
